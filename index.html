<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111111">
    <title>Übungs-Zähler</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body {
            height: 100%; overflow: hidden;
            overscroll-behavior: none;
            -webkit-user-select: none; user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #111; color: #fff;
            /* Safe area insets for notch/punch-hole phones */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        /* Scrollable inner container */
        #scroll-wrap {
            height: 100vh;
            height: 100dvh; /* dynamic viewport height — handles Android chrome bar */
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 1rem;
        }
        #app { max-width: 520px; margin: 0 auto; padding: 1rem 0; }

        /* ── EXERCISE PICKER ── */
        #picker { margin-bottom: 1.5rem; }
        #picker h2 { font-size: 13px; color: #555; font-weight: 400; margin-bottom: 10px; letter-spacing: 0.05em; text-transform: uppercase; }
        #ex-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .ex-btn {
            padding: 14px 8px; border-radius: 10px; border: 0.5px solid #333;
            background: #1a1a1a; color: #aaa; font-size: 13px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            transition: all 0.15s;
            min-height: 72px; touch-action: manipulation;
            -webkit-user-select: none; user-select: none;
        }
        .ex-btn .ex-icon { font-size: 1.6rem; }
        .ex-btn:hover { border-color: #555; color: #fff; background: #222; }
        .ex-btn.selected { border-color: #378add; color: #378add; background: rgba(55,138,221,0.1); }
        .ex-btn:disabled { opacity: 0.4; cursor: default; }

        /* ── CAM ── */
        #cam-wrap { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 1rem; }
        #v { width: 100%; height: 100%; object-fit: cover; display: block; transform: scaleX(-1); }
        #overlay { position: absolute; inset: 0; pointer-events: none; transform: scaleX(-1); width: 100%; height: 100%; }

        /* Countdown overlay */
        #calib-countdown {
            position: absolute; inset: 0;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.55);
            z-index: 20;
        }
        #calib-countdown.active { display: flex; }
        #cd-number {
            font-size: 5rem; font-weight: 700; color: #fff;
            line-height: 1; text-shadow: 0 0 30px rgba(55,138,221,0.9);
            transition: transform 0.15s;
        }
        #cd-number.pulse { transform: scale(1.35); }
        #cd-label { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 8px; text-align: center; padding: 0 20px; }
        #cd-pose-check { font-size: 12px; margin-top: 10px; padding: 4px 14px; border-radius: 20px; }
        #cd-pose-check.ok  { background: rgba(76,175,80,0.25); color: #4caf50; border: 0.5px solid #4caf50; }
        #cd-pose-check.bad { background: rgba(255,150,0,0.2);  color: #ff9600; border: 0.5px solid #ff9600; }

        #counter-badge {
            position: absolute; top: 12px; right: 12px;
            width: 72px; height: 72px;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            z-index: 10;
        }
        #ring-svg { position: absolute; inset: 0; width: 100%; height: 100%; transform-origin: center center; will-change: transform, filter; }
        #count-num { font-size: 1.6rem; font-weight: 600; color: #fff; line-height: 1; position: relative; z-index: 1; }
        #count-label { font-size: 10px; color: rgba(255,255,255,0.55); position: relative; z-index: 1; }

        #status-pill {
            position: absolute; bottom: 12px; left: 12px;
            background: rgba(0,0,0,0.6); border-radius: 20px;
            padding: 4px 12px; font-size: 12px; color: rgba(255,255,255,0.8);
            max-width: calc(100% - 24px);
        }
        #ex-badge {
            position: absolute; top: 12px; left: 12px;
            background: rgba(0,0,0,0.6); border-radius: 20px;
            padding: 4px 12px; font-size: 12px; color: rgba(255,255,255,0.7);
            display: none;
        }
        #debug-box {
            position: absolute; bottom: 40px; left: 12px;
            background: rgba(0,0,0,0.65); border-radius: 8px;
            padding: 6px 10px; font-size: 11px;
            color: rgba(255,255,255,0.75); line-height: 1.8;
            display: none;
        }
        /* Confidence indicator dots */
        #conf-dots {
            position: absolute; bottom: 40px; right: 12px;
            display: none; flex-direction: column; gap: 4px; align-items: flex-end;
        }
        .conf-dot-row { display: flex; align-items: center; gap: 5px; }
        .conf-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
        .conf-dot.ok { background: #4caf50; }
        .conf-dot.warn { background: #ff9600; }
        .conf-dot-label { font-size: 10px; color: rgba(255,255,255,0.5); }

        /* ── DEPTH BAR ── */
        #depth-track { width: 100%; height: 5px; background: #222; border-radius: 3px; margin-top: -6px; margin-bottom: 10px; overflow: hidden; }
        #depth-fill { height: 100%; width: 0%; border-radius: 3px; background: linear-gradient(90deg, #378add, #9b59b6); transition: width 0.08s; }

        /* ── CONTROLS ── */
        button.main {
            width: 100%; padding: 14px; border-radius: 8px; font-size: 15px;
            cursor: pointer; margin-bottom: 0.75rem;
            background: transparent; color: #fff; border: 0.5px solid #555;
            min-height: 48px; /* Android touch target minimum */
            -webkit-user-select: none; user-select: none;
            touch-action: manipulation;
        }
        button.main:hover { background: #1a1a1a; }
        button.main:disabled { opacity: 0.5; cursor: default; }
        button.main.accent { border-color: #378add; color: #378add; }
        button.main.accent:hover { background: rgba(55,138,221,0.1); }
        #calib-hint { font-size: 12px; color: #666; margin-bottom: 0.75rem; line-height: 1.5; display: none; }

        .phase-indicator { display: flex; gap: 8px; margin-bottom: 1rem; }
        .phase-dot { flex: 1; padding: 6px; border-radius: 6px; text-align: center; font-size: 12px; background: #1a1a1a; color: #555; border: 0.5px solid #333; transition: all 0.2s; }
        .phase-dot.active { background: #0c447c; color: #85b7eb; border-color: #378add; }
        .phase-dot.done   { background: #0f3d1a; color: #4caf50; border-color: #4caf50; }

        /* ── BARS ── */
        #bar-section { margin-bottom: 1rem; }
        .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .bar-label { font-size: 12px; color: #aaa; min-width: 120px; }
        .bar-bg { flex: 1; height: 10px; background: #222; border-radius: 5px; border: 0.5px solid #333; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; border-radius: 5px; transition: width 0.08s; }
        .bar-val { font-size: 12px; color: #aaa; min-width: 36px; text-align: right; }

        /* ── SENSITIVITY SLIDER ── */
        #sens-row { display: flex; align-items: center; gap: 10px; margin-bottom: 0.75rem; display: none; }
        #sens-row label { font-size: 12px; color: #666; min-width: 80px; }
        #sens-slider { flex: 1; accent-color: #378add; }
        #sens-val { font-size: 12px; color: #aaa; min-width: 30px; text-align: right; }
    </style>
</head>
<body>
<div id="scroll-wrap">
<div id="app">

    <!-- EXERCISE PICKER -->
    <div id="picker">
        <h2>Übung wählen</h2>
        <div id="ex-grid">
            <button class="ex-btn selected" data-ex="pushup">
                <span class="ex-icon">💪</span>Liegestütz
            </button>
            <button class="ex-btn" data-ex="situp">
                <span class="ex-icon">🔄</span>Situps
            </button>
            <button class="ex-btn" data-ex="squat">
                <span class="ex-icon">🦵</span>Kniebeuge
            </button>
        </div>
    </div>

    <!-- CAM -->
    <div id="cam-wrap">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>

        <!-- Countdown overlay -->
        <div id="calib-countdown">
            <div id="cd-number">10</div>
            <div id="cd-label">Startposition einnehmen</div>
            <div id="cd-pose-check" class="bad">Pose nicht erkannt</div>
        </div>

        <!-- Confidence dots -->
        <div id="conf-dots"></div>

        <div id="counter-badge">
            <svg id="ring-svg" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
                <circle id="ring-circle" cx="36" cy="36" r="32" fill="rgba(0,0,0,0.6)" stroke="#378add" stroke-width="4"/>
            </svg>
            <span id="count-num">0</span>
            <span id="count-label">reps</span>
        </div>
        <div id="ex-badge"></div>
        <div id="status-pill">Übung wählen &amp; Kamera starten</div>
        <div id="debug-box">
            <div>Score: <span id="d-score">—</span></div>
            <div>Phase: <span id="d-phase">—</span></div>
            <div>Konfidenz: <span id="d-conf">—</span></div>
        </div>
    </div>
    <div id="depth-track"><div id="depth-fill"></div></div>

    <button class="main" id="start-btn">Kamera starten</button>
    <div id="calib-hint"></div>

    <!-- Sensitivity slider -->
    <div id="sens-row">
        <label>Empfindlichkeit</label>
        <input type="range" id="sens-slider" min="0.5" max="2.0" step="0.1" value="1.0">
        <span id="sens-val">1.0×</span>
    </div>

    <button class="main accent" id="calib-btn" style="display:none">Jetzt kalibrieren</button>
    <div class="phase-indicator" id="phases" style="display:none">
        <div class="phase-dot" id="ph-calib">Kalibriert</div>
        <div class="phase-dot" id="ph-down">↓</div>
        <div class="phase-dot" id="ph-up">↑</div>
    </div>
    <div id="bar-section">
        <div class="bar-row">
            <span class="bar-label" id="bar1-label">Signal 1</span>
            <div class="bar-bg"><div class="bar-fill" id="bar1" style="background:#378add"></div></div>
            <span class="bar-val" id="val1">—</span>
        </div>
        <div class="bar-row">
            <span class="bar-label" id="bar2-label">Signal 2</span>
            <div class="bar-bg"><div class="bar-fill" id="bar2" style="background:#9b59b6"></div></div>
            <span class="bar-val" id="val2">—</span>
        </div>
        <div class="bar-row">
            <span class="bar-label">Gesamt-Score</span>
            <div class="bar-bg"><div class="bar-fill" id="bar-score" style="background:#4caf50"></div></div>
            <span class="bar-val" id="val-score">—</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script>
(async () => {

    // ─────────────────────────────────────────────────────────────────────────
    // UTILITIES
    // ─────────────────────────────────────────────────────────────────────────
    function angle(a, b, c) {
        // Angle at vertex b formed by points a-b-c (degrees)
        const ab = { x: a.x - b.x, y: a.y - b.y };
        const cb = { x: c.x - b.x, y: c.y - b.y };
        const dot = ab.x * cb.x + ab.y * cb.y;
        const mag = Math.sqrt((ab.x**2 + ab.y**2) * (cb.x**2 + cb.y**2));
        if (mag === 0) return 0;
        return Math.acos(Math.max(-1, Math.min(1, dot / mag))) * (180 / Math.PI);
    }

    function dist(a, b) {
        return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
    }

    function validPts(pts, minConf) {
        return pts.every(p => p && p.score >= minConf);
    }

    // Smooth score with EMA
    function ema(prev, next, alpha) { return prev + (next - prev) * alpha; }

    // Average confidence of a set of keypoints
    function avgConf(pts) {
        return pts.reduce((s, p) => s + (p ? p.score : 0), 0) / pts.length;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // EXERCISE DEFINITIONS — improved
    // ─────────────────────────────────────────────────────────────────────────
    const EXERCISES = {

        // ── PUSH-UPS ──────────────────────────────────────────────────────────
        // Approach: Use elbow angle (shoulder-elbow-wrist) as primary signal.
        // At top position: arms nearly straight ~160°+.
        // At bottom: elbows bent ~70-90°.
        // Secondary: shoulder drop (y-movement).
        // Works for side view AND slightly front view.
        pushup: {
            name: 'Liegestütz',
            icon: '💪',
            labels: {
                calib: 'Arme gestreckt halten — Startposition (oben)',
                down:  'Runter ↓',
                up:    'Hoch ↑',
                bar1:  'Ellbogen-Winkel',
                bar2:  'Schulter-Absenkung',
            },
            // score: 0 = arms straight (top), 1 = fully down
            thresholds: { down: 0.55, up: 0.15 },
            MIN_CONF: 0.25,

            _getKp(kp) {
                // Try to use the better-visible side
                const lSh = kp[5], rSh = kp[6];
                const lEl = kp[7], rEl = kp[8];
                const lWr = kp[9], rWr = kp[10];
                // Pick the side with highest combined confidence
                const lConf = (lSh?.score||0) + (lEl?.score||0) + (lWr?.score||0);
                const rConf = (rSh?.score||0) + (rEl?.score||0) + (rWr?.score||0);
                if (lConf >= rConf && validPts([lSh,lEl,lWr], this.MIN_CONF))
                    return { sh: lSh, el: lEl, wr: lWr, bothSh: [lSh, rSh] };
                if (validPts([rSh,rEl,rWr], this.MIN_CONF))
                    return { sh: rSh, el: rEl, wr: rWr, bothSh: [lSh, rSh] };
                return null;
            },

            calibrate(kp, vidW, vidH) {
                const pts = this._getKp(kp);
                if (!pts) return null;
                const elbowAngle = angle(pts.sh, pts.el, pts.wr);
                if (elbowAngle < 120) return null; // not in extended position
                const shY = (
                    ((pts.bothSh[0]?.score||0) > this.MIN_CONF ? pts.bothSh[0].y : pts.sh.y) +
                    ((pts.bothSh[1]?.score||0) > this.MIN_CONF ? pts.bothSh[1].y : pts.sh.y)
                ) / 2;
                return {
                    topAngle: elbowAngle,       // ~160-180° when arms straight
                    topShY:   shY / vidH,
                };
            },

            getScore(kp, b, vidW, vidH) {
                const pts = this._getKp(kp);
                if (!pts) return null;
                const elbowAngle = angle(pts.sh, pts.el, pts.wr);
                const shY = pts.sh.y / vidH;
                // Angle drops from ~170° to ~80° → normalize
                const topAngle = Math.min(b.topAngle, 175);
                const angleSig = Math.max(0, (topAngle - elbowAngle)) / (topAngle - 60);
                // Shoulder descends as arms bend
                const shDrop = Math.max(0, (shY - b.topShY)) / 0.08;
                const score = angleSig * 0.7 + Math.min(1, shDrop) * 0.3;
                return {
                    score: Math.min(1, Math.max(0, score)),
                    sig1: Math.min(1, angleSig),
                    sig2: Math.min(1, shDrop),
                    conf: avgConf([pts.sh, pts.el, pts.wr]),
                };
            },

            confKeypoints(kp) {
                return {
                    'L Schulter': kp[5], 'R Schulter': kp[6],
                    'L Ellbogen': kp[7], 'R Ellbogen': kp[8],
                    'L Handgel.': kp[9], 'R Handgel.': kp[10],
                };
            },
        },

        // ── SIT-UPS ──────────────────────────────────────────────────────────
        // KEY INSIGHT: When lying down MoveNet struggles with hips/shoulders.
        // Strategy: use NOSE Y as the primary anchor — the face is always visible.
        // When flat: nose is at a certain Y level (high on screen if camera above,
        //   or in center if camera is at side).
        // When sitting up: nose rises significantly (camera above) OR
        //   the nose-to-shoulder vertical gap shrinks (body goes upright).
        //
        // We use a MULTI-SIGNAL approach and take the MAX so any one signal
        // firing is enough. Confidence thresholds are kept very low.
        // "Pose verloren" is avoided by only returning null if ALL signals are bad.
        situp: {
            name: 'Situps',
            icon: '🔄',
            labels: {
                calib: 'Flach hinlegen & Kamera von der Seite oder von oben',
                down:  'Hoch ↑ — aufrichten!',
                up:    'Runter ↓ — hinlegen!',
                bar1:  'Nase / Schulter-Lift',
                bar2:  'Rumpf-Streckung',
            },
            thresholds: { down: 0.38, up: 0.09 },
            MIN_CONF: 0.12,   // very low — lying down reduces confidence a lot

            // Helper: get best-available Y for a pair of keypoints (picks the one with higher conf)
            _bestY(a, b, minConf) {
                const aOk = a?.score >= minConf, bOk = b?.score >= minConf;
                if (aOk && bOk) return (a.y + b.y) / 2;
                if (aOk) return a.y;
                if (bOk) return b.y;
                return null;
            },

            calibrate(kp, vidW, vidH) {
                const nose  = kp[0];
                const lSh   = kp[5], rSh = kp[6];
                const lHi   = kp[11], rHi = kp[12];
                const lKn   = kp[13], rKn = kp[14];

                const noseOk = nose?.score >= this.MIN_CONF;
                const shY    = this._bestY(lSh, rSh, this.MIN_CONF);
                const hiY    = this._bestY(lHi, rHi, this.MIN_CONF);
                const knY    = this._bestY(lKn, rKn, this.MIN_CONF);

                // Need at least nose OR shoulders
                if (!noseOk && shY === null) return null;

                return {
                    noseY:  noseOk ? nose.y / vidH : (shY !== null ? shY / vidH - 0.05 : 0.3),
                    shY:    shY !== null ? shY / vidH : null,
                    hiY:    hiY !== null ? hiY / vidH : null,
                    knY:    knY !== null ? knY / vidH : null,
                    // reference distance: shoulder-to-knee when lying (body length)
                    bodySpan: (shY !== null && knY !== null)
                        ? Math.abs(knY - shY) / vidH
                        : 0.4, // fallback estimate
                };
            },

            getScore(kp, b, vidW, vidH) {
                const nose  = kp[0];
                const lSh   = kp[5], rSh = kp[6];
                const lHi   = kp[11], rHi = kp[12];
                const lKn   = kp[13], rKn = kp[14];

                const noseOk = nose?.score >= this.MIN_CONF;
                const shY    = this._bestY(lSh, rSh, this.MIN_CONF);
                const hiY    = this._bestY(lHi, rHi, this.MIN_CONF);
                const knY    = this._bestY(lKn, rKn, this.MIN_CONF);

                // If literally nothing is visible, bail
                if (!noseOk && shY === null && hiY === null) return null;

                let sig1 = 0, sig2 = 0;

                // ── SIGNAL 1: Nose/shoulder upward movement ──────────────────
                // When sitting up the upper body RISES (Y decreases in image coords
                // if camera is to the side, or comes toward center if camera above).
                // We measure Y drop from calibration baseline.
                if (noseOk && b.noseY !== null) {
                    const noseRise = Math.max(0, b.noseY - nose.y / vidH);
                    // normalize: a rise of ~15% of screen height = full signal
                    sig1 = Math.max(sig1, noseRise / 0.14);
                }
                if (shY !== null && b.shY !== null) {
                    const shRise = Math.max(0, b.shY - shY / vidH);
                    sig1 = Math.max(sig1, shRise / 0.12);
                }

                // ── SIGNAL 2: Body compaction / trunk curl ────────────────────
                // When lying flat: shoulder-to-knee span is large.
                // When sitting up: body folds → span shrinks (side cam).
                // Also: shoulder-to-hip gap changes.
                if (shY !== null && knY !== null && b.bodySpan > 0.05) {
                    const curSpan = Math.abs(knY / vidH - shY / vidH);
                    const spanShrink = Math.max(0, (b.bodySpan - curSpan) / b.bodySpan);
                    sig2 = Math.max(sig2, spanShrink);
                }
                if (shY !== null && hiY !== null && b.shY !== null && b.hiY !== null) {
                    const baseGap = Math.abs(b.hiY - b.shY);
                    const curGap  = Math.abs(hiY / vidH - shY / vidH);
                    if (baseGap > 0.01) {
                        sig2 = Math.max(sig2, Math.max(0, (baseGap - curGap) / baseGap));
                    }
                }

                // Take the strongest combination
                const score = sig1 * 0.65 + sig2 * 0.35;

                const confPts = [nose, lSh, rSh, lHi, rHi].filter(p => p?.score >= this.MIN_CONF);
                const conf = confPts.length > 0
                    ? confPts.reduce((s, p) => s + p.score, 0) / confPts.length
                    : 0.15;

                return {
                    score: Math.min(1, Math.max(0, score)),
                    sig1: Math.min(1, sig1),
                    sig2: Math.min(1, sig2),
                    conf,
                };
            },

            confKeypoints(kp) {
                return {
                    'Nase':       kp[0],
                    'L Schulter': kp[5], 'R Schulter': kp[6],
                    'L Hüfte':   kp[11], 'R Hüfte':   kp[12],
                    'L Knie':    kp[13],
                };
            },
        },

        // ── SQUATS ────────────────────────────────────────────────────────────
        // Approach: Knee angle (hip-knee-ankle) as primary.
        // Standing: knee angle ~170°. Squat: ~80-90°.
        // Secondary: hip height drop relative to calibration.
        squat: {
            name: 'Kniebeuge',
            icon: '🦵',
            labels: {
                calib: 'Aufrecht stehen — Startposition (oben)',
                down:  'Runter ↓',
                up:    'Hoch ↑',
                bar1:  'Knie-Winkel',
                bar2:  'Hüft-Absenkung',
            },
            thresholds: { down: 0.50, up: 0.12 },
            MIN_CONF: 0.22,

            _getKp(kp) {
                const lHi = kp[11], rHi = kp[12];
                const lKn = kp[13], rKn = kp[14];
                const lAn = kp[15], rAn = kp[16];
                // Prefer the side with higher confidence
                const lConf = (lHi?.score||0) + (lKn?.score||0) + (lAn?.score||0);
                const rConf = (rHi?.score||0) + (rKn?.score||0) + (rAn?.score||0);
                // Also try both sides average
                const bothHi = validPts([lHi, rHi], this.MIN_CONF - 0.02)
                    ? { x: (lHi.x+rHi.x)/2, y: (lHi.y+rHi.y)/2, score: (lHi.score+rHi.score)/2 }
                    : null;
                if (lConf >= rConf && validPts([lHi,lKn,lAn], this.MIN_CONF))
                    return { hi: lHi, kn: lKn, an: lAn, bothHi };
                if (validPts([rHi,rKn,rAn], this.MIN_CONF))
                    return { hi: rHi, kn: rKn, an: rAn, bothHi };
                return null;
            },

            calibrate(kp, vidW, vidH) {
                const pts = this._getKp(kp);
                if (!pts) return null;
                const kneeAngle = angle(pts.hi, pts.kn, pts.an);
                if (kneeAngle < 130) return null; // must be standing
                const hiY = (pts.bothHi ? pts.bothHi.y : pts.hi.y) / vidH;
                return {
                    topAngle: kneeAngle,
                    topHipY:  hiY,
                    legLen:   Math.abs(pts.kn.y - pts.an.y) / vidH, // knee-to-ankle distance normalized
                };
            },

            getScore(kp, b, vidW, vidH) {
                const pts = this._getKp(kp);
                if (!pts) return null;
                const kneeAngle = angle(pts.hi, pts.kn, pts.an);
                const hiY = (pts.bothHi ? pts.bothHi.y : pts.hi.y) / vidH;

                const topAngle = Math.min(b.topAngle, 178);
                // knee angle drops from ~170° toward ~80°
                const angleSig = Math.max(0, (topAngle - kneeAngle)) / (topAngle - 75);

                // Hip drops when squatting
                const hipDrop = Math.max(0, (hiY - b.topHipY)) / (b.legLen * 0.5 || 0.08);

                const score = angleSig * 0.65 + Math.min(1, hipDrop) * 0.35;
                return {
                    score: Math.min(1, Math.max(0, score)),
                    sig1: Math.min(1, angleSig),
                    sig2: Math.min(1, hipDrop),
                    conf: avgConf([pts.hi, pts.kn, pts.an]),
                };
            },

            confKeypoints(kp) {
                return {
                    'L Hüfte':   kp[11], 'R Hüfte':   kp[12],
                    'L Knie':    kp[13], 'R Knie':    kp[14],
                    'L Knöchel': kp[15], 'R Knöchel': kp[16],
                };
            },
        },
    };

    // ─────────────────────────────────────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────────────────────────────────────
    let selectedEx   = 'pushup';
    let count        = 0;
    let isDown       = false;
    let detector     = null;
    let running      = false;
    let calibrated   = false;
    let baseline     = null;
    let lastPoses    = null;
    let smoothScore  = 0;        // EMA-smoothed score
    let sensitivity  = 1.0;

    // Countdown state
    let countdownActive = false;
    let countdownTimer  = null;
    let cdSec           = 10;
    let cdPoseOk        = false;

    // ─────────────────────────────────────────────────────────────────────────
    // RING ANIMATION
    // ─────────────────────────────────────────────────────────────────────────
    const svg    = document.getElementById('ring-svg');
    const circle = document.getElementById('ring-circle');
    let targetDepth = 0, smoothDepth = 0, flashT = 0;
    const FLASH_MS = 550, LERP = 0.18;

    function applyRing(depth, flash) {
        let scale, glow, r, g, b;
        if (flash > 0) {
            const e = 1 - Math.pow(flash, 3);
            scale = 1.45 - e * 0.45;
            glow  = flash * 18;
            r = Math.round(76  + (55  - 76)  * e);
            g = Math.round(175 + (138 - 175) * e);
            b = Math.round(80  + (221 - 80)  * e);
        } else {
            scale = 1 + depth * 0.45;
            glow  = depth * 14;
            r = Math.round(55  + depth * 200);
            g = Math.round(138 - depth * 80);
            b = Math.round(221 - depth * 180);
        }
        const col = `rgb(${r},${g},${b})`;
        svg.style.transform = `scale(${scale.toFixed(4)})`;
        svg.style.filter    = `drop-shadow(0 0 ${glow.toFixed(1)}px ${col})`;
        circle.setAttribute('stroke', col);
        circle.setAttribute('stroke-width', (4 + (flash > 0 ? flash : depth) * 3).toFixed(1));
    }

    let lastTs = null;
    (function rafLoop(ts) {
        requestAnimationFrame(rafLoop);
        const dt = lastTs ? Math.min(ts - lastTs, 100) : 16;
        lastTs = ts;
        smoothDepth += (targetDepth - smoothDepth) * LERP;
        if (flashT > 0) flashT = Math.max(0, flashT - dt / FLASH_MS);
        applyRing(smoothDepth, flashT);
    })();

    function triggerFlash() { flashT = 1; }

    // ─────────────────────────────────────────────────────────────────────────
    // UI HELPERS
    // ─────────────────────────────────────────────────────────────────────────
    function setStatus(msg, color) {
        const p = document.getElementById('status-pill');
        p.textContent = msg;
        p.style.color = color || 'rgba(255,255,255,0.8)';
    }

    function setPhase(phase) {
        document.getElementById('ph-calib').className = 'phase-dot' + (calibrated ? ' done' : '');
        document.getElementById('ph-down').className  = 'phase-dot' + (phase === 'down' ? ' active' : '');
        document.getElementById('ph-up').className    = 'phase-dot' + (phase === 'up'   ? ' active' : '');
    }

    function updateUI() {
        document.getElementById('count-num').textContent = count;
    }

    function applyExerciseLabels() {
        const ex = EXERCISES[selectedEx];
        document.getElementById('bar1-label').textContent = ex.labels.bar1;
        document.getElementById('bar2-label').textContent = ex.labels.bar2;
        document.getElementById('calib-hint').textContent = '📌 ' + ex.labels.calib;
        document.getElementById('ex-badge').textContent  = ex.icon + ' ' + ex.name;
    }

    function updateConfDots(kp) {
        const ex = EXERCISES[selectedEx];
        const pts = ex.confKeypoints(kp);
        const container = document.getElementById('conf-dots');
        container.innerHTML = '';
        Object.entries(pts).forEach(([name, pt]) => {
            const row = document.createElement('div');
            row.className = 'conf-dot-row';
            const dot = document.createElement('div');
            const conf = pt?.score || 0;
            dot.className = 'conf-dot ' + (conf >= 0.35 ? 'ok' : conf >= 0.20 ? 'warn' : '');
            const label = document.createElement('div');
            label.className = 'conf-dot-label';
            label.textContent = name;
            row.append(label, dot);
            container.appendChild(row);
        });
    }

    function drawSkeleton(canvas, poses, vidW, vidH) {
        const ctx = canvas.getContext('2d');
        canvas.width = vidW; canvas.height = vidH;
        ctx.clearRect(0, 0, vidW, vidH);
        if (!poses.length) return;
        const kp = poses[0].keypoints;
        const pairs = [[5,7],[7,9],[6,8],[8,10],[5,6],[11,12],[5,11],[6,12],[11,13],[13,15],[12,14],[14,16]];
        ctx.lineWidth = 2;
        pairs.forEach(([i,j]) => {
            const a = kp[i], b = kp[j];
            if (a && b && a.score > 0.22 && b.score > 0.22) {
                const alpha = Math.min(1, (Math.min(a.score, b.score) - 0.22) / 0.3 + 0.4);
                ctx.strokeStyle = `rgba(55,138,221,${alpha.toFixed(2)})`;
                ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
            }
        });
        kp.forEach(p => {
            if (p && p.score > 0.22) {
                const alpha = Math.min(1, (p.score - 0.22) / 0.3 + 0.4);
                ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 2*Math.PI);
                ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
                ctx.fill();
                ctx.strokeStyle = `rgba(55,138,221,${alpha.toFixed(2)})`;
                ctx.lineWidth = 2; ctx.stroke();
            }
        });
    }

    // ─────────────────────────────────────────────────────────────────────────
    // AUTO CALIBRATION COUNTDOWN
    // ─────────────────────────────────────────────────────────────────────────
    function startCountdown() {
        if (countdownActive) return;
        countdownActive = true;
        cdSec = 10;
        countdownActive = true;

        const overlay  = document.getElementById('calib-countdown');
        const numEl    = document.getElementById('cd-number');
        const poseEl   = document.getElementById('cd-pose-check');
        const labelEl  = document.getElementById('cd-label');

        overlay.classList.add('active');
        labelEl.textContent = EXERCISES[selectedEx].labels.calib;
        numEl.textContent   = cdSec;

        function tick() {
            // Check pose during countdown
            cdPoseOk = false;
            if (lastPoses && lastPoses.length) {
                const kp = lastPoses[0].keypoints;
                const vW = lastPoses[0]._vW || 640, vH = lastPoses[0]._vH || 480;
                const b  = EXERCISES[selectedEx].calibrate(kp, vW, vH);
                cdPoseOk = !!b;
                // For situps, also accept if just nose or shoulders are visible
                if (!cdPoseOk && selectedEx === 'situp') {
                    const nose = kp[0], lSh = kp[5], rSh = kp[6];
                    cdPoseOk = (nose?.score >= 0.12) || (lSh?.score >= 0.12) || (rSh?.score >= 0.12);
                }
            }
            poseEl.textContent  = cdPoseOk ? '✓ Pose erkannt' : '✗ Pose nicht erkannt';
            poseEl.className    = 'cd-pose-check ' + (cdPoseOk ? 'ok' : 'bad');

            // Pulse animation
            numEl.classList.remove('pulse');
            void numEl.offsetWidth; // reflow
            numEl.classList.add('pulse');
            setTimeout(() => numEl.classList.remove('pulse'), 200);

            if (cdSec <= 0) {
                // Attempt calibration
                overlay.classList.remove('active');
                countdownActive = false;
                doCalibrate();
                return;
            }
            cdSec--;
            numEl.textContent = cdSec;
            countdownTimer = setTimeout(tick, 1000);
        }

        countdownTimer = setTimeout(tick, 1000);
    }

    function stopCountdown() {
        if (countdownTimer) clearTimeout(countdownTimer);
        countdownActive = false;
        document.getElementById('calib-countdown').classList.remove('active');
    }

    function doCalibrate() {
        if (!lastPoses || !lastPoses.length) {
            setStatus('Kein Körper erkannt — bitte Kalibrieren drücken', 'orange');
            return;
        }
        const kp = lastPoses[0].keypoints;
        const vW = lastPoses[0]._vW || 640, vH = lastPoses[0]._vH || 480;
        const ex = EXERCISES[selectedEx];
        const b  = ex.calibrate(kp, vW, vH);
        if (!b) {
            setStatus('Pose nicht erkannt — näher zur Kamera & neu kalibrieren', 'orange');
            document.getElementById('calib-btn').textContent = 'Neu kalibrieren';
            return;
        }
        baseline   = b;
        calibrated = true;
        smoothScore = 0;
        targetDepth = 0; smoothDepth = 0;
        isDown = false;
        document.getElementById('calib-btn').textContent    = 'Neu kalibrieren';
        document.getElementById('calib-btn').style.borderColor = '#4caf50';
        document.getElementById('calib-btn').style.color       = '#4caf50';
        setPhase(null);
        setStatus('✓ Kalibriert — los geht\'s!', '#4caf50');
        setTimeout(() => { if (calibrated) setStatus('Bereit'); }, 1800);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // EXERCISE PICKER
    // ─────────────────────────────────────────────────────────────────────────
    document.querySelectorAll('.ex-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.ex-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedEx = btn.dataset.ex;
            applyExerciseLabels();
            // Reset alles
            calibrated = false; baseline = null;
            count = 0; isDown = false;
            smoothScore = 0;
            targetDepth = 0; smoothDepth = 0;
            window._poseLostCount = 0;
            updateUI();
            document.getElementById('calib-btn').textContent = 'Jetzt kalibrieren';
            document.getElementById('calib-btn').style.borderColor = '';
            document.getElementById('calib-btn').style.color = '';
            // Wenn Kamera läuft: Countdown neu starten
            if (running) {
                stopCountdown();
                setStatus('📌 ' + EXERCISES[selectedEx].labels.calib);
                setTimeout(() => startCountdown(), 300);
            }
        };
    });

    // ─────────────────────────────────────────────────────────────────────────
    // MANUAL CALIBRATE BUTTON
    // ─────────────────────────────────────────────────────────────────────────
    document.getElementById('calib-btn').onclick = () => {
        stopCountdown();
        doCalibrate();
    };

    // ─────────────────────────────────────────────────────────────────────────
    // SENSITIVITY SLIDER
    // ─────────────────────────────────────────────────────────────────────────
    const sensSlider = document.getElementById('sens-slider');
    sensSlider.addEventListener('input', () => {
        sensitivity = parseFloat(sensSlider.value);
        document.getElementById('sens-val').textContent = sensitivity.toFixed(1) + '×';
    });

    // ─────────────────────────────────────────────────────────────────────────
    // START CAMERA
    // ─────────────────────────────────────────────────────────────────────────
    document.getElementById('start-btn').onclick = async () => {
        if (running) return;
        const btn = document.getElementById('start-btn');
        btn.disabled = true; btn.textContent = 'Startet…';
        count = 0; updateUI();
        applyExerciseLabels();

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } });
            const v = document.getElementById('v');
            v.srcObject = stream;
            await new Promise(r => v.onloadedmetadata = r);
            setStatus('Modell lädt…');
            detector = await poseDetection.createDetector(
                poseDetection.SupportedModels.MoveNet,
                { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
            );
            btn.textContent = 'Läuft…';
            running = true;

            // Kein Lock — Übung kann jederzeit gewechselt werden

            document.getElementById('calib-hint').style.display = '';
            document.getElementById('calib-btn').style.display  = '';
            document.getElementById('debug-box').style.display  = '';
            document.getElementById('phases').style.display     = '';
            document.getElementById('ex-badge').style.display   = '';
            document.getElementById('conf-dots').style.display  = 'flex';
            document.getElementById('sens-row').style.display   = 'flex';

            // Pose detection loop
            setInterval(async () => {
                if (!detector) return;
                try {
                    const poses = await detector.estimatePoses(v);
                    const vW = v.videoWidth || 640, vH = v.videoHeight || 480;
                    drawSkeleton(document.getElementById('overlay'), poses, vW, vH);

                    if (!poses.length) {
                        setStatus('Kein Körper sichtbar');
                        return;
                    }
                    poses[0]._vW = vW; poses[0]._vH = vH;
                    lastPoses = poses;

                    updateConfDots(poses[0].keypoints);

                    if (!calibrated) return;

                    const ex  = EXERCISES[selectedEx];
                    const res = ex.getScore(poses[0].keypoints, baseline, vW, vH);
                    if (!res) { window._poseLostCount = (window._poseLostCount||0)+1; if (window._poseLostCount > 10) setStatus('Körper nicht klar sichtbar — Kamera weiter weg?', '#ff9600'); return; } window._poseLostCount = 0;

                    const { score, sig1, sig2, conf } = res;

                    // Apply sensitivity scaling
                    const T_DOWN = ex.thresholds.down / sensitivity;
                    const T_UP   = ex.thresholds.up   / sensitivity;

                    smoothScore = ema(smoothScore, score, 0.25);

                    targetDepth = Math.min(1, Math.max(0, smoothScore / ex.thresholds.down));
                    document.getElementById('depth-fill').style.width = (targetDepth * 100).toFixed(1) + '%';

                    document.getElementById('bar1').style.width  = (sig1 * 100).toFixed(1) + '%';
                    document.getElementById('val1').textContent  = Math.round(sig1 * 100) + '%';
                    document.getElementById('bar2').style.width  = (sig2 * 100).toFixed(1) + '%';
                    document.getElementById('val2').textContent  = Math.round(sig2 * 100) + '%';
                    document.getElementById('bar-score').style.width = (targetDepth * 100).toFixed(1) + '%';
                    document.getElementById('val-score').textContent = Math.round(targetDepth * 100) + '%';

                    document.getElementById('d-score').textContent = smoothScore.toFixed(3);
                    document.getElementById('d-phase').textContent = isDown ? 'unten' : 'oben';
                    document.getElementById('d-conf').textContent  = Math.round(conf * 100) + '%';

                    if (smoothScore > T_DOWN && !isDown) {
                        isDown = true;
                        setPhase('down');
                        setStatus(ex.labels.down, '#378add');
                    }
                    if (smoothScore < T_UP && isDown) {
                        isDown = false; count++;
                        updateUI();
                        triggerFlash();
                        setPhase('up');
                        setStatus('Rep ' + count + '! ✓', '#4caf50');
                        setTimeout(() => { setPhase(null); if (!isDown) setStatus('Bereit'); }, 900);
                    }

                } catch(e) { /* silently ignore per-frame errors */ }
            }, 100); // 10 fps for detection

            // Auto-calibration countdown starts after 2s (give model time to warm up)
            setTimeout(() => {
                setStatus('📌 ' + EXERCISES[selectedEx].labels.calib);
                startCountdown();
            }, 2000);

        } catch(e) {
            btn.disabled = false; btn.textContent = 'Kamera starten';
            setStatus('Kamerafehler: ' + e.message);
        }
    };

    // Init
    applyExerciseLabels();
    updateUI();

    // ── Capacitor / native bridge ─────────────────────────────────────────
    // Vibrate on rep count (works on Android via Capacitor Haptics)
    const _origTriggerFlash = triggerFlash;
    window.triggerFlash = function() {
        _origTriggerFlash();
        try {
            // Web Vibration API — works in Capacitor WebView on Android
            if (navigator.vibrate) navigator.vibrate([60, 30, 60]);
        } catch(e) {}
    };

    // Lock screen orientation to portrait (Capacitor ScreenOrientation plugin
    // handles this natively; the browser hint below works as fallback)
    try {
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('portrait').catch(() => {});
        }
    } catch(e) {}

    // Hide Android status bar via Capacitor StatusBar plugin if available
    document.addEventListener('deviceready', () => {
        if (window.StatusBar) window.StatusBar.hide();
    });
})();
</script>

<!-- Capacitor runtime (injected automatically when built with cap sync,
     safe to leave here — does nothing in plain browser) -->
<script>
    // Prevent double-tap zoom on Android
    let lastTouch = 0;
    document.addEventListener('touchend', e => {
        const now = Date.now();
        if (now - lastTouch < 300) e.preventDefault();
        lastTouch = now;
    }, { passive: false });

    // Pull-to-refresh deaktivieren
    document.addEventListener('touchmove', e => {
        if (e.touches.length === 1) e.preventDefault();
    }, { passive: false });
</script>
</div> <!-- /scroll-wrap -->
</div> <!-- /app -->
